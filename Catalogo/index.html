<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Productos</title>

<meta name="description" content="Catálogo online de productos con filtros y ofertas">

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
}

header{
    background:#1f2937;
    color:white;
    padding:20px;
    text-align:center;
}

.barra{
    background:white;
    padding:15px;
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

select,input{
    padding:8px;
}

#catalogo{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
    padding:20px;
}

.producto{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.galeria{
    display:flex;
    overflow-x:auto;
}

.galeria img{
    width:100%;
    min-width:100%;
    height:220px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.precio-anterior{
    text-decoration:line-through;
    color:red;
}

.precio-actual{
    font-size:24px;
    color:green;
    font-weight:bold;
}

.oferta{
    background:#ff5722;
    color:white;
    padding:5px 10px;
    border-radius:5px;
}
</style>
</head>
<body>

<header>
    <h1>Catálogo de Productos</h1>
    <p>Encuentra las mejores ofertas</p>
</header>

<div class="barra">

    <label>
        Ofertas
        <input type="checkbox" id="soloOfertas">
    </label>

    <select id="ordenPrecio">
        <option value="">Ordenar según precio</option>
        <option value="asc">Menor a Mayor</option>
        <option value="desc">Mayor a Menor</option>
    </select>

    <select id="categoria">
        <option value="">Todas las categorías</option>
    </select>

</div>

<div id="catalogo"></div>

<!-- Carga los productos -->
<script src="datos.js"></script>

<script>

const catalogo = document.getElementById("catalogo");
const categoriaSelect = document.getElementById("categoria");

function cargarCategorias() {
    const categorias = [...new Set(productos.map(p => p.categoria))];

    categorias.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        categoriaSelect.appendChild(option);
    });
}

function mostrarProductos() {

    let lista = [...productos];

    const categoria = categoriaSelect.value;
    const orden = document.getElementById("ordenPrecio").value;
    const ofertas = document.getElementById("soloOfertas").checked;

    if(categoria){
        lista = lista.filter(p => p.categoria === categoria);
    }

    if(ofertas){
        lista = lista.filter(
            p => p.precioActual < p.precioAnterior
        );
    }

    if(orden === "asc"){
        lista.sort((a,b)=>a.precioActual-b.precioActual);
    }

    if(orden === "desc"){
        lista.sort((a,b)=>b.precioActual-a.precioActual);
    }

    catalogo.innerHTML = "";

    lista.forEach(producto=>{

        catalogo.innerHTML += `
        <div class="producto">

            <div class="galeria">
                ${producto.imagenes.map(img =>
                    `<img src="${img}" alt="${producto.titulo}">`
                ).join("")}
            </div>

            <div class="info">

                <h2>${producto.titulo}</h2>

                <p>${producto.descripcion}</p>

                <p>
                    <strong>ID:</strong> ${producto.id}
                </p>

                <p>
                    <strong>Categoría:</strong>
                    ${producto.categoria}
                </p>

                <p>
                    <strong>Dimensiones:</strong>
                    ${producto.dimensiones.altura}
                    ×
                    ${producto.dimensiones.ancho}
                    ×
                    ${producto.dimensiones.fondo}
                </p>

                <p class="precio-anterior">
                    $${producto.precioAnterior}
                </p>

                <p class="precio-actual">
                    $${producto.precioActual}
                </p>

                ${
                    producto.precioActual < producto.precioAnterior
                    ? '<span class="oferta">OFERTA</span>'
                    : ''
                }

            </div>

        </div>
        `;
    });
}

document
.getElementById("ordenPrecio")
.addEventListener("change",mostrarProductos);

document
.getElementById("categoria")
.addEventListener("change",mostrarProductos);

document
.getElementById("soloOfertas")
.addEventListener("change",mostrarProductos);

cargarCategorias();
mostrarProductos();

</script>

</body>
</html>
