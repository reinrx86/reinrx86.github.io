<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Productos</title>

<meta name="description" content="Catálogo online de productos con filtros y ofertas">

<script src="datos.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

header{
    background:#1f2937;
    color:white;
    text-align:center;
    padding:25px;
}

header p{
    margin-top:10px;
}

.barra{
    background:white;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.barra select,
.barra input{
    padding:8px;
}

#catalogo{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
    padding:20px;
}

.producto{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.galeria{
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
}

.galeria img{
    width:100%;
    min-width:100%;
    height:220px;
    object-fit:cover;
    scroll-snap-align:start;
}

.info{
    padding:15px;
}

.info h2{
    margin-bottom:10px;
}

.info p{
    margin-bottom:8px;
}

.precio-anterior{
    color:red;
    text-decoration:line-through;
}

.precio-actual{
    color:green;
    font-size:24px;
    font-weight:bold;
}

.oferta{
    display:inline-block;
    background:#ff5722;
    color:white;
    padding:5px 10px;
    border-radius:5px;
    margin-top:10px;
}

</style>
</head>
<body>

<header>
    <h1>Catálogo de Productos</h1>
    <p>Encuentra las mejores ofertas</p>
</header>

<div class="barra">

    <label>
        Ofertas
        <input type="checkbox" id="soloOfertas">
    </label>

    <select id="ordenPrecio">
        <option value="">Ordenar según precio</option>
        <option value="asc">Menor a Mayor</option>
        <option value="desc">Mayor a Menor</option>
    </select>

    <select id="categoria">
        <option value="">Todas las categorías</option>
    </select>

</div>

<div id="catalogo"></div>

<script>

const catalogo = document.getElementById("catalogo");
const categoriaSelect = document.getElementById("categoria");

function cargarCategorias(){

    const categorias = [...new Set(
        productos.map(producto => producto.categoria)
    )];

    categorias.forEach(categoria => {

        const option = document.createElement("option");

        option.value = categoria;
        option.textContent = categoria;

        categoriaSelect.appendChild(option);
    });
}

function mostrarProductos(){

    let lista = [...productos];

    const categoria = categoriaSelect.value;
    const orden = document.getElementById("ordenPrecio").value;
    const ofertas = document.getElementById("soloOfertas").checked;

    if(categoria){
        lista = lista.filter(
            producto => producto.categoria === categoria
        );
    }

    if(ofertas){
        lista = lista.filter(
            producto => producto.precioActual < producto.precioAnterior
        );
    }

    if(orden === "asc"){
        lista.sort(
            (a,b) => a.precioActual - b.precioActual
        );
    }

    if(orden === "desc"){
        lista.sort(
            (a,b) => b.precioActual - a.precioActual
        );
    }

    catalogo.innerHTML = "";

    lista.forEach(producto => {

        catalogo.innerHTML += `
        <div class="producto">

            <div class="galeria">
                ${producto.imagenes.map(imagen =>
                    `<img src="${imagen}" alt="${producto.titulo}">`
                ).join("")}
            </div>

            <div class="info">

                <h2>${producto.titulo}</h2>

                <p>${producto.descripcion}</p>

                <p><strong>ID:</strong> ${producto.id}</p>

                <p><strong>Categoría:</strong> ${producto.categoria}</p>

                <p>
                    <strong>Dimensiones:</strong>
                    ${producto.dimensiones.altura} ×
                    ${producto.dimensiones.ancho} ×
                    ${producto.dimensiones.fondo}
                </p>

                <p class="precio-anterior">
                    $${producto.precioAnterior}
                </p>

                <p class="precio-actual">
                    $${producto.precioActual}
                </p>

                ${
                    producto.precioActual < producto.precioAnterior
                    ? '<span class="oferta">OFERTA</span>'
                    : ''
                }

            </div>

        </div>
        `;
    });
}

document
.getElementById("ordenPrecio")
.addEventListener("change", mostrarProductos);

document
.getElementById("categoria")
.addEventListener("change", mostrarProductos);

document
.getElementById("soloOfertas")
.addEventListener("change", mostrarProductos);

cargarCategorias();
mostrarProductos();

</script>

</body>
</html>
