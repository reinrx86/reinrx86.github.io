<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo de Productos</title>

<meta name="description" content="Catálogo online de productos con filtros y ofertas">

<link rel="stylesheet" href="estilos.css">

<script src="datos.js"></script>
</head>

<body>

<header>
    <h1>Catálogo de Productos</h1>
    <p>Encuentra las mejores ofertas</p>
</header>

<div class="barra">

    <input id="buscar" placeholder="Buscar producto...">

    <button id="btnOfertas">
        Ofertas
    </button>

    <select id="ordenPrecio">
        <option value="">Ordenar precio</option>
        <option value="asc">Menor a Mayor</option>
        <option value="desc">Mayor a Menor</option>
    </select>

    <select id="categoria">
        <option value="">Todas las categorías</option>
    </select>

</div>

<div id="catalogo"></div>

<div id="modal" class="modal">

    <div class="modal-content">

        <span class="close">&times;</span>

        <img id="modalImg">

        <div class="controls">
            <button id="prev">◀</button>
            <button id="next">▶</button>
        </div>

    </div>

</div>

<script>

const catalogo = document.getElementById("catalogo");
const categoriaSelect = document.getElementById("categoria");

let soloOfertas = false;
let imagenesActuales = [];
let indice = 0;

function formatoPrecio(n){
    return "$" + Number(n).toLocaleString("es-CL");
}

function cargarCategorias(){

    const cats = [...new Set(
        productos.map(p => p.categoria)
    )];

    cats.forEach(c => {

        const op = document.createElement("option");

        op.value = c;
        op.textContent = c;

        categoriaSelect.appendChild(op);

    });

}

function mostrarProductos(){

    let lista = [...productos];

    const texto =
    document
    .getElementById("buscar")
    .value
    .toLowerCase();

    if(texto){

        lista = lista.filter(
            p => p.titulo
            .toLowerCase()
            .includes(texto)
        );

    }

    if(categoriaSelect.value){

        lista = lista.filter(
            p => p.categoria === categoriaSelect.value
        );

    }

    if(soloOfertas){

        lista = lista.filter(
            p => p.precioActual < p.precioAnterior
        );

    }

    const orden =
    document.getElementById("ordenPrecio").value;

    if(orden === "asc"){

        lista.sort(
            (a,b) =>
            a.precioActual - b.precioActual
        );

    }

    if(orden === "desc"){

        lista.sort(
            (a,b) =>
            b.precioActual - a.precioActual
        );

    }

    catalogo.innerHTML = "";

    lista.forEach(p => {

        const descuento =
        Math.round(
            (1 - p.precioActual / p.precioAnterior)
            * 100
        );

        catalogo.innerHTML += `

        <div
            class="producto"
            onclick="abrirProducto(${p.id})">

            <img
                class="producto-img"
                src="${p.imagenes[0]}"
                data-img1="${p.imagenes[0]}"
                data-img2="${p.imagenes[1]}"
                data-img3="${p.imagenes[2]}"
                alt="${p.titulo}"
            >

            <div class="puntos">

                <span class="punto activo"></span>
                <span class="punto"></span>
                <span class="punto"></span>

            </div>

            <div class="info">

                <h3>${p.titulo}</h3>

                <p>
                    <strong>${p.categoria}</strong>
                </p>

                <p>${p.descripcion}</p>

                <p>
                    ${p.dimensiones.altura}
                    ×
                    ${p.dimensiones.ancho}
                    ×
                    ${p.dimensiones.fondo}
                </p>

                <p class="precio-anterior">
                    ${formatoPrecio(p.precioAnterior)}
                </p>

                <p class="precio-actual">
                    ${formatoPrecio(p.precioActual)}
                </p>

                ${
                    p.precioActual < p.precioAnterior
                    ?
                    `<span class="oferta">-${descuento}%</span>`
                    :
                    ""
                }

            </div>

        </div>
        `;

    });

    activarPreviewImagenes();

}

function activarPreviewImagenes(){

    document
    .querySelectorAll(".producto")
    .forEach(producto => {

        const img =
        producto.querySelector(".producto-img");

        producto.addEventListener(
            "mousemove",
            (e)=>{

                const rect =
                producto.getBoundingClientRect();

                const pos =
                e.clientX - rect.left;

                const porcentaje =
                pos / rect.width;

                let nueva;

                if(porcentaje < 0.33){

                    nueva = img.dataset.img1;

                }
                else if(porcentaje < 0.66){

                    nueva = img.dataset.img2;

                }
                else{

                    nueva = img.dataset.img3;

                }

                if(img.src !== nueva){

                    img.style.opacity = 0;

                    setTimeout(()=>{

                        img.src = nueva;

                        img.style.opacity = 1;

                    },80);

                }

            }
        );

        producto.addEventListener(
            "mouseleave",
            ()=>{

                img.src = img.dataset.img1;
                img.style.opacity = 1;

            }
        );

    });

}

function abrirProducto(id){

    const p =
    productos.find(
        x => x.id === id
    );

    imagenesActuales = p.imagenes;

    indice = 0;

    document
    .getElementById("modalImg")
    .src = imagenesActuales[0];

    document
    .getElementById("modal")
    .style.display = "flex";

}

document
.getElementById("btnOfertas")
.onclick = ()=>{

    soloOfertas = !soloOfertas;

    document
    .getElementById("btnOfertas")
    .classList
    .toggle("activo");

    mostrarProductos();

};

document
.getElementById("buscar")
.addEventListener(
    "input",
    mostrarProductos
);

document
.getElementById("ordenPrecio")
.addEventListener(
    "change",
    mostrarProductos
);

categoriaSelect
.addEventListener(
    "change",
    mostrarProductos
);

document
.querySelector(".close")
.onclick = ()=>{

    document
    .getElementById("modal")
    .style.display = "none";

};

document
.getElementById("prev")
.onclick = ()=>{

    indice =
    (
        indice - 1 +
        imagenesActuales.length
    )
    %
    imagenesActuales.length;

    document
    .getElementById("modalImg")
    .src = imagenesActuales[indice];

};

document
.getElementById("next")
.onclick = ()=>{

    indice =
    (
        indice + 1
    )
    %
    imagenesActuales.length;

    document
    .getElementById("modalImg")
    .src = imagenesActuales[indice];

};

cargarCategorias();
mostrarProductos();

</script>

</body>
</html>
