<!DOCTYPE html>
<html lang="es">
<link rel="icon" type="image/png" href="icons/favicon.png">
    
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Museo de Fanarts</title>

<link rel="stylesheet" href="estilos.css">
<script src="artistas.js" defer></script>
<script src="datos.js" defer></script>
<script src="app.js" defer></script>

</head>

<body>

<header class="portada">
    <img src="img/portada.png" alt="Museo de Fanarts">
</header>

<div id="galeria"></div>
<!-- MODAL REDES -->
<div id="modal-redes" class="modal oculto">
    <div class="modal-contenido">

        <span id="cerrar-modal" class="cerrar">&times;</span>

        <h2 id="nombre-artista-modal"></h2>

        <p class="subtitulo-redes">
            Redes del artista
        </p>

        <div id="redes" class="redes-container"></div>

    </div>
</div>

<!-- MODAL NSFW -->
<div id="modal-nsfw" class="modal oculto">

    <div class="modal-contenido">

        <h2>Contenido Sensible (+18)</h2>

        <img
            src="img/nsfw.png"
            alt="NSFW"
            class="nsfw-preview"
        >

        <p>
            Este fanart contiene contenido para adultos.
            <br><br>
            ¿Tienes 18 años o más y deseas visualizarlo?
        </p>

        <div class="nsfw-botones">

            <button id="cancelar-nsfw">
                Cancelar
            </button>

            <button id="aceptar-nsfw">
                Ver contenido
            </button>

        </div>

    </div>

</div>
<!-- VISOR DE IMAGEN -->
<div id="visor" class="oculto">

    <img id="visor-img" src="" alt="Fanart">

</div>
</body>
</html>
