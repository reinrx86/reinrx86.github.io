<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Museo de Fanarts</title>

<link rel="icon" type="image/png" href="icons/favicon.png">
<link rel="stylesheet" href="estilos.css">
<link rel="stylesheet" href="modal.css">
<link rel="stylesheet" href="cuadros.css">
<link rel="stylesheet" href="tema.css">

<script src="enlaces.js" defer></script>
<script src="fanarts.js" defer></script>
<script src="punteros.js"></script>
<script src="canciones.js"></script>
<script src="app.js" defer></script>
</head>

<body>
<header class="portada">
    <img src="img/portada.png" alt="Museo de Fanarts">
</header>

<div id="galeria"></div>

<div id="modal-redes" class="modal oculto">
    <div class="modal-contenido">
        <span id="cerrar-modal" class="cerrar">&times;</span>
        <h2 id="nombre-artista-modal"></h2>
        <p class="subtitulo-redes">Redes del artista</p>
        <div id="redes" class="redes-container"></div>
    </div>
</div>

<div id="modal-nsfw" class="modal oculto">
    <div class="modal-contenido">
        <h2>Contenido Sensible (+18)</h2>

        <img src="img/nsfw.png" alt="NSFW" class="nsfw-preview">

        <p>
            Este fanart contiene contenido +18 solo para adultos.
            <br><br>
            ¿Tienes 18 años o más y deseas visualizarlo?
        </p>

        <div class="nsfw-botones">
            <button id="cancelar-nsfw">Cancelar</button>
            <button id="aceptar-nsfw">Ver contenido</button>
        </div>
    </div>
</div>

<div id="visor" class="oculto">
    <img id="visor-img" alt="Fanart">
</div>
<button id="btn-cursor">
    VF-22S
</button>
<button id="btn-musica">
    <img src="icons/actsong.png" alt="Música">
</button>

<audio id="musica" loop>
    <source src="REMEMBER_16.mp3" type="audio/mpeg">
</audio>
</body>
</html>
