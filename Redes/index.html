<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rein_rx86</title>

<!-- 🔥 FAVICON LLAMA -->
<link rel="icon" type="image/png" href="llama.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
    --cursor-random:url("puntero/vf22s.png") 0 0;
}

body,
a,
button{
    cursor:var(--cursor-random),pointer;
}

/* ===== BOTÓN MÚSICA ===== */

#btn-musica,
#btn-cursor{
    position:fixed;
    top:10px;

    width:42px;
    height:42px;

    border:none;
    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:12px;
    font-weight:700;

    color:white;

    background:rgba(0,0,0,.7);
    backdrop-filter:blur(6px);

    box-shadow:0 0 15px rgba(0,0,0,.6);

    z-index:9999;

    transition:.2s;
}

#btn-musica{
    right:10px;
}

#btn-cursor{
    left:10px;
}

#btn-musica:hover,
#btn-cursor:hover{
    transform:scale(1.08);
}

#btn-musica img{
    width:24px;
    height:24px;
}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:url("fondo.png") center/cover fixed;
    color:white;
    text-align:center;
}

.container{
    max-width:500px;
    margin:40px auto;
    padding:40px 25px;
    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(8px);
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,0,0,0.7);
}

/* ===== FOTO PERFIL ===== */
.profile-img{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:20px;
    padding:4px;
    background:linear-gradient(45deg,#ff0000,#ff4500,#ff7a00,#ff0000);
    animation:fireGlow 2s infinite alternate;
}

@keyframes fireGlow{
    from{
        box-shadow:
            0 0 10px #ff3c00,
            0 0 25px rgba(255,60,0,.6),
            0 0 45px rgba(255,120,0,.4);
    }
    to{
        box-shadow:
            0 0 18px #ff6a00,
            0 0 35px rgba(255,80,0,.9),
            0 0 60px rgba(255,120,0,.7);
    }
}

h1{
    margin:10px 0;
    font-size:32px;
    font-weight:800;
}

.section-title{
    margin-top:35px;
    font-size:14px;
    font-weight:600;
    letter-spacing:2px;
    text-transform:uppercase;
    opacity:0.85;
}

.links{ margin-top:15px; }

/* ===== BOTONES ===== */
.link-btn{
    display:flex;
    align-items:center;
    margin:12px 0;
    padding:14px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:14px;
    text-decoration:none;
    color:white;
    font-size:17px;
    font-weight:600;
    backdrop-filter:blur(6px);
    transition:0.3s ease;
}

.link-btn:hover{ transform:scale(1.05); }

/* icono fijo izquierda */
.link-btn i{
    width:30px;
    text-align:center;
    font-size:20px;
}

/* texto centrado real */
.link-btn span{
    flex:1;
    text-align:center;
}

/* ===== COLORES ICONOS ===== */
.twitch i{ color:#9146FF; }
.instagram i{ color:#DD2A7B; }
.reddit i{ color:#FF4500; }
.cults i{ color:#0099ff; }
.kofi i{ color:#FF5E5B; }
.discord i{ color:#5865F2; }
.fanarts{
    background:linear-gradient(
        145deg,
        #d4af37,
        #a67c00,
        #f6e27a,
        #8c6a00
    );

    border:1px solid #5c3b12;
}

.fanarts i{
    color:#2a1a00;
}

.fanarts span{
    color:#2a1a00;
}

.fanarts:hover{
    background:linear-gradient(
        145deg,
        #e7c95a,
        #c18b00,
        #fff2a6,
        #a67c00
    );

    box-shadow:0 0 20px #d4af37;
}

/* hover → icono blanco */
.link-btn:hover i{ color:white; }

.fanarts:hover i{
    color:#2a1a00 !important;
}

/* ===== HOVER COLORES BOTONES (los tuyos intactos) ===== */
.twitch:hover{ background:#9146FF; box-shadow:0 0 20px #9146FF; }
.instagram:hover{
    background:linear-gradient(45deg,#F58529,#DD2A7B,#8134AF,#515BD4);
    box-shadow:0 0 20px #DD2A7B;
}
.reddit:hover{ background:#FF4500; box-shadow:0 0 20px #FF4500; }
.cults:hover{ background:#0099ff; box-shadow:0 0 20px #0099ff; }
.kofi:hover{ background:#FF5E5B; box-shadow:0 0 20px #FF5E5B; }
.discord:hover{ background:#5865F2; box-shadow:0 0 20px #5865F2; }

/* ===== MODAL ===== */
.modal-bg{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.modal{
    background:#111;
    padding:30px;
    border-radius:18px;
    max-width:420px;
    width:90%;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
    animation:fadeIn .25s ease;
}

.modal h2{ color:#FF4500; }

.modal p{
    opacity:.9;
    line-height:1.5em;
}

.modal-buttons{
    margin-top:25px;
    display:flex;
    gap:12px;
    justify-content:center;
}

.modal-buttons button{
    border:none;
    padding:12px 18px;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

.btn-enter{
    background:#FF4500;
    color:white;
}
.btn-enter:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #FF4500;
}

.btn-cancel{
    background:#444;
    color:white;
}
.btn-cancel:hover{ background:#666; }

@keyframes fadeIn{
    from{opacity:0; transform:scale(.9);}
    to{opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">

    <img src="icon_rein2.png" class="profile-img">
    <h1>Rein_rx86</h1>

    <div class="section-title">🎨 Fanarts</div>

    <div class="links">

        <a href="https://reinrx86.github.io/Museo-Fanarts/"
        target="_blank"
        class="link-btn fanarts">

            <i class="fas fa-palette"></i>
            <span>Museo de Fanarts</span>

        </a>

    </div>

    <div class="section-title">🌐 Redes Oficiales</div>

    <div class="links">

        <a href="https://www.twitch.tv/rein_rx86" target="_blank" class="link-btn twitch">
            <i class="fab fa-twitch"></i>
            <span>Twitch</span>
        </a>

        <a href="https://www.instagram.com/rein_rx86/" target="_blank" class="link-btn instagram">
            <i class="fab fa-instagram"></i>
            <span>Instagram</span>
        </a>

        <a href="#" class="link-btn reddit" onclick="openRedditModal(event)">
            <i class="fab fa-reddit"></i>
            <span>Reddit</span>
        </a>

        <a href="https://cults3d.com/en/users/Rein_rx86/3d-models" target="_blank" class="link-btn cults">
            <i class="fas fa-cube"></i>
            <span>Cults3D</span>
        </a>

        <a href="https://ko-fi.com/rein_rx86" target="_blank" class="link-btn kofi">
            <i class="fas fa-mug-hot"></i>
            <span>Ko-fi</span>
        </a>

    </div>

    <div class="section-title">💬 Comunidad</div>

    <div class="links">
        <a href="https://discord.gg/3geFhjwQVH" target="_blank" class="link-btn discord">
            <i class="fab fa-discord"></i>
            <span>Discord</span>
        </a>
    </div>

</div>

<div class="modal-bg" id="redditModal">
    <div class="modal">
        <h2>⚠ Contenido NSFW</h2>
        <p>
        Este perfil puede contener material para adultos.<br>
        Debes ser mayor de edad para continuar.
        </p>

        <div class="modal-buttons">
            <button class="btn-enter" onclick="goToReddit()">Soy mayor de edad</button>
            <button class="btn-cancel" onclick="closeRedditModal()">Salir</button>
        </div>
    </div>
</div>

<button id="btn-cursor">VF-22S</button>

<button id="btn-musica">
    <img src="icons/offsong.png" alt="Música">
</button>

<audio id="musica" loop></audio>

<script>

// =========================
// REDDIT
// =========================

function openRedditModal(e){
    e.preventDefault();
    document.getElementById("redditModal").style.display="flex";
}

function closeRedditModal(){
    document.getElementById("redditModal").style.display="none";
}

function goToReddit(){
    window.open("https://www.reddit.com/user/Rein_rx86/","_blank");
    closeRedditModal();
}

// =========================
// CURSORES
// =========================

const punteros = [
    {nombre:"VF-22S",archivo:"puntero/vf22s.png"},
    {nombre:"VF-19E",archivo:"puntero/vf19e.png"},
    {nombre:"VF-17S",archivo:"puntero/vf17s.png"},
    {nombre:"VF-11M",archivo:"puntero/vf11maxl.png"},
    {nombre:"VF-1",archivo:"puntero/vf1.png"},
    {nombre:"VF-25",archivo:"puntero/vf25.png"},
    {nombre:"VF-31S",archivo:"puntero/vf31s.png"}
];

const btnCursor =
    document.getElementById("btn-cursor");

let cursorActual =
    Math.floor(Math.random() * punteros.length);

function actualizarCursor(){

    document.documentElement.style.setProperty(
        "--cursor-random",
        `url("${punteros[cursorActual].archivo}") 0 0`
    );

    btnCursor.textContent =
        punteros[cursorActual].nombre;
}

actualizarCursor();

btnCursor.addEventListener("click",()=>{

    cursorActual++;

    if(cursorActual >= punteros.length){
        cursorActual = 0;
    }

    actualizarCursor();
});

// =========================
// MÚSICA
// =========================

const canciones = [
    "musica/REMEMBER_16.mp3",
    "musica/MY_FRIENDS.mp3"
];

const audio =
    document.getElementById("musica");

const btnMusica =
    document.getElementById("btn-musica");

audio.src =
    canciones[Math.floor(Math.random()*canciones.length)];

audio.volume = 0.1;

document.addEventListener("click",()=>{

    if(audio.paused){

        audio.play().catch(()=>{});

        btnMusica.innerHTML =
            '<img src="icons/actsong.png" alt="">';
    }

},{once:true});

btnMusica.addEventListener("click",(e)=>{

    e.stopPropagation();

    if(audio.paused){

        audio.play();

        btnMusica.innerHTML =
            '<img src="icons/actsong.png" alt="">';

    }else{

        audio.pause();

        btnMusica.innerHTML =
            '<img src="icons/offsong.png" alt="">';
    }

});

audio.addEventListener("ended",()=>{

    audio.currentTime = 0;
    audio.play();

});

</script>
</body>
</html>
